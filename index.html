<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caavo0 AI</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #080c14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e3e3e3;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px 20px;
            background: #080c14;
            z-index: 10;
        }

        .tab-btn {
            flex: 1;
            max-width: 140px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #151e2e;
            color: #90e0ef;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: #0077b6;
            color: white;
        }

        .tab-content {
            display: none;
            flex: 1;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .tab-content.active { 
            display: flex; 
            flex-direction: column;
        }

        /* Medya Sekmesi Linkleri */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding: 40px 20px;
            width: 100%;
        }

        a.social-btn {
            text-decoration: none;
            background: #151e2e;
            color: #90e0ef;
            padding: 18px 20px;
            border-radius: 16px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            border: 1px solid #1f2d44;
            transition: background 0.2s;
        }

        a.social-btn:hover {
            background: #1f2d44;
        }

        /* Gemini Stili Chat Düzeni */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .chat-header {
            padding: 10px 20px;
            text-align: center;
            font-size: 1.1rem;
            color: #90e0ef;
            font-weight: 500;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 100px; /* Alttaki inputun üstünü kapatmaması için */
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user-message { 
            background: #0077b6; 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px;
        }
        
        .ai-message { 
            background: transparent; 
            color: #e3e3e3; 
            align-self: flex-start; 
            padding-left: 5px; /* Gemini stili düz metin görünümü */
        }

        /* Karşılama Yazısı Ortalama */
        .welcome-text {
            text-align: center;
            color: #90e0ef;
            font-size: 1.4rem;
            margin-top: auto;
            margin-bottom: auto;
            padding: 0 20px;
        }

        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
            background: #151e2e;
            border-radius: 20px;
            align-self: flex-start;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #90e0ef;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.3s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Gemini Tarzı Oval Alttaki Input Kutusu */
        .chat-input-wrapper {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: #151e2e;
            border-radius: 32px;
            display: flex;
            align-items: center;
            padding: 6px 10px 6px 18px;
            border: 1px solid #1f2d44;
        }

        .chat-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            font-size: 1rem;
            outline: none;
        }

        .chat-input-wrapper button {
            background: #0077b6;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: background 0.2s;
        }

        .chat-input-wrapper button:hover {
            background: #00b4d8;
        }

        /* Ayarlar Butonu */
        .settings-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 30;
            opacity: 0.8;
        }

        /* Ayarlar Sayfası */
        .settings-page {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #080c14;
            display: none;
            flex-direction: column;
            z-index: 40;
        }

        .settings-page.show { display: flex; }

        .settings-header {
            padding: 20px;
            display: flex;
            align-items: center;
            background: #151e2e;
        }

        .back-btn { font-size: 1.8rem; margin-right: 15px; cursor: pointer; }
        .settings-title { font-size: 1.5rem; color: #48cae4; }
        .settings-body { padding: 25px; flex: 1; }
        .setting-item {
            padding: 18px 0;
            border-bottom: 1px solid #1f2d44;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- Ayarlar Butonu (Sağ Üstte Daha Şık) -->
    <div class="settings-btn" onclick="openSettings()">⚙️</div>

    <div class="tabs">
        <button class="tab-btn active" id="mediaTab" onclick="switchTab(0)">Medya</button>
        <button class="tab-btn" id="aiTab" onclick="switchTab(1)">Caavo0 AI</button>
    </div>

    <!-- Medya Sekmesi -->
    <div id="tab0" class="tab-content active">
        <div class="links-container">
            <a href="https://github.com/caavo0" class="social-btn" target="_blank">GitHub</a>
            <a href="https://www.youtube.com/@caavo0-r6u" class="social-btn" target="_blank">YouTube</a>
            <a href="https://www.tiktok.com/@caavo0" class="social-btn" target="_blank">TikTok</a>
            <a href="https://discord.com/users/caavo0_" class="social-btn" target="_blank">Discord</a>
        </div>
    </div>

    <!-- AI Sohbet Sekmesi -->
    <div id="tab1" class="tab-content">
        <div class="chat-container">
            <div class="chat-header" id="chatHeader">Caavo0 Aİh</div>
            <div class="chat-messages" id="chatMessages">
                <!-- Gemini stilinde açılış metni ortada başlar -->
                <div class="welcome-text" id="welcomeMessage">Merhaba! Nasıl yardımcı olabilirim?</div>
            </div>
            <div class="chat-input-wrapper">
                <input type="text" id="userInput" placeholder="Caavo0'a sorun..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="sendBtn">➔</button>
            </div>
        </div>
    </div>

    <!-- Ayarlar Sayfası -->
    <div class="settings-page" id="settingsPage">
        <div class="settings-header">
            <span class="back-btn" onclick="closeSettings()">←</span>
            <div class="settings-title" id="settingsTitle">Ayarlar</div>
        </div>
        <div class="settings-body">
            <div class="setting-item">
                <span id="languageLabel">Dil Seçimi</span>
                <select id="languageSelect" onchange="changeLanguage()" style="background:#151e2e; color:white; border:1px solid #1f2d44; padding:8px 12px; border-radius:8px;">
                    <option value="tr">Türkçe</option>
                    <option value="en">English</option>
                    <option value="de">Deutsch</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        let currentLang = "tr";

        const translations = {
            tr: {
                mediaTab: "Medya",
                aiTab: "Caavo0 AI",
                chatHeader: "Caavo0 Flash",
                welcomeMessage: "Merhaba! Nasıl yardımcı olabilirim?",
                inputPlaceholder: "Caavo0'a sorun...",
                settingsTitle: "Ayarlar",
                languageLabel: "Dil Seçimi",
                errorMessage: "Bağlantı hatası, tekrar dene."
            },
            en: {
                mediaTab: "Media",
                aiTab: "Caavo0 AI",
                chatHeader: "Caavo0 Flash",
                welcomeMessage: "Hello! How can I help you today?",
                inputPlaceholder: "Ask Caavo0...",
                settingsTitle: "Settings",
                languageLabel: "Language",
                errorMessage: "Connection error, please try again."
            },
            de: {
                mediaTab: "Medien",
                aiTab: "Caavo0 AI",
                chatHeader: "Caavo0 Flash",
                welcomeMessage: "Hallo! Wie kann ich dir heute helfen?",
                inputPlaceholder: "Frag Caavo0...",
                settingsTitle: "Einstellungen",
                languageLabel: "Sprache",
                errorMessage: "Verbindungsfehler, bitte erneut versuchen."
            }
        };

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach((el, i) => el.classList.toggle('active', i === n));
            document.querySelectorAll('.tab-btn').forEach((el, i) => el.classList.toggle('active', i === n));
        }

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const chatHeader = document.getElementById('chatHeader');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const sendBtn = document.getElementById('sendBtn');
        const mediaTab = document.getElementById('mediaTab');
        const aiTab = document.getElementById('aiTab');

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // İlk mesaj gönderildiğinde ortadaki hoş geldiniz yazısını kaldırır
            if(welcomeMessage) {
                welcomeMessage.remove();
            }

            appendMessage(text, 'user-message');
            userInput.value = '';

            const typing = showTypingIndicator();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                typing.remove();
                typeWriterEffect(data.reply || translations[currentLang].errorMessage, 'ai-message');
            } catch (err) {
                typing.remove();
                typeWriterEffect(translations[currentLang].errorMessage, 'ai-message');
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function typeWriterEffect(fullText, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            let processedText = fullText.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            let i = 0;
            function type() {
                if (i < processedText.length) {
                    let char = processedText.charAt(i);
                    if (char === '\n') {
                        div.innerHTML += '<br>';
                    } else {
                        div.innerHTML += char;
                    }
                    i++;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    setTimeout(type, 15);
                }
            }
            type();
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        function openSettings() {
            document.getElementById('settingsPage').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsPage').classList.remove('remove');
            document.getElementById('settingsPage').classList.remove('show');
        }

        function changeLanguage() {
            currentLang = document.getElementById('languageSelect').value;
            
            mediaTab.textContent = translations[currentLang].mediaTab;
            aiTab.textContent = translations[currentLang].aiTab;
            chatHeader.textContent = translations[currentLang].chatHeader;
            if(document.getElementById('welcomeMessage')) {
                welcomeMessage.textContent = translations[currentLang].welcomeMessage;
            }
            userInput.placeholder = translations[currentLang].inputPlaceholder;
            document.getElementById('settingsTitle').textContent = translations[currentLang].settingsTitle;
            document.getElementById('languageLabel').textContent = translations[currentLang].languageLabel;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>caavo0</title>
    <style>
        /* Genel Sayfa Ayarları ve Mavi Tema */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b132b; /* Koyu lacivert/mavi arka plan */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 40px 20px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Partikül Arka Planının Konumu */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* caavo0 Başlığı */
        h1 {
            font-size: 3.5rem;
            color: #48cae4; /* Açık mavi */
            text-shadow: 0 0 15px #00b4d8; /* Parlama efekti */
            z-index: 1;
            margin-bottom: 25px;
            margin-top: 0;
            letter-spacing: 2px;
        }

        /* Sosyal Medya Butonları Konteyneri */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
            width: 100%;
            max-width: 300px;
            margin-bottom: 30px;
        }

        /* Tuş Tasarımları */
        a.social-btn {
            text-decoration: none;
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            color: white;
            padding: 15px 20px;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4);
            border: 2px solid transparent;
        }

        a.social-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 180, 216, 0.6);
            border: 2px solid #90e0ef;
        }

        /* Yapay Zeka Penceresi Tasarımı */
        .chat-container {
            width: 100%;
            max-width: 320px;
            height: 380px;
            background: rgba(26, 39, 68, 0.75);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 180, 216, 0.3);
            border: 2px solid #00b4d8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        .chat-header {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 1px;
            color: white;
            border-bottom: 1px solid rgba(144, 224, 239, 0.3);
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap; /* Boşlukların ve satırların erimemesi için */
        }

        .user-message {
            background-color: #48cae4;
            color: #0b132b;
            font-weight: bold;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            box-shadow: 0 2px 8px rgba(0, 180, 216, 0.3);
        }

        .ai-message {
            background-color: #1d2d44;
            color: #90e0ef;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #3a506b;
        }

        /* Yapay Zeka Üç Nokta Yazıyor Animasyonu Tasarımı */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 10px 14px;
            background-color: #1d2d44;
            border-radius: 15px;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #3a506b;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #90e0ef;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.3s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-input-area {
            display: flex;
            padding: 12px;
            background: #0b132b;
            gap: 8px;
            border-top: 1px solid rgba(0, 180, 216, 0.2);
        }

        .chat-input-area input {
            flex: 1;
            background: #1d2d44;
            border: 1px solid #3a506b;
            padding: 10px 15px;
            border-radius: 25px;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .chat-input-area input:focus {
            border-color: #48cae4;
        }

        .chat-input-area button {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            border: none;
            color: white;
            padding: 0 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .chat-input-area button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 180, 216, 0.5);
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <h1>caavo0</h1>

    <div class="links-container">
        <a href="https://github.com/caavo0" class="social-btn" target="_blank">GitHub</a>
        <a href="https://www.youtube.com/@caavo0-r6u" class="social-btn" target="_blank">YouTube</a>
        <a href="https://www.tiktok.com/@caavo0" class="social-btn" target="_blank">TikTok</a>
        <a href="https://discord.com/users/caavo0_" class="social-btn" target="_blank">Discord</a>
    </div>

    <div class="chat-container">
        <div class="chat-header">caavo0 AI Assistant</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message ai-message">Merhaba! Ben Caavo0 Yapay Zekası</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Bir şeyler yazın..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        // Partikül Ayarları
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 }, 
                "color": { "value": "#90e0ef" }, 
                "shape": { "type": "circle" },
                "opacity": { "value": 0.6 },
                "size": { "value": 3 },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#00b4d8",
                    "opacity": 0.4,
                    "width": 1.5
                },
                "move": { "enable": true, "speed": 2 }
            },
            "interactivity": {
                "events": {
                    "onhover": { "enable": true, "mode": "repulse" }, 
                    "onclick": { "enable": true, "mode": "push" } 
                }
            }
        });

        // Tıklama Sesi Ayarları
        const clickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'); 
        
        document.addEventListener('click', (e) => {
            clickSound.currentTime = 0; 
            clickSound.play().catch(error => {
                console.log("Ses çalma engellendi.", error);
            });
        });

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');

        // Geçmişi Lokal Hafızadan Yükle
        window.addEventListener('DOMContentLoaded', () => {
            const savedHistory = localStorage.getItem('chatHistory');
            if (savedHistory) {
                chatMessages.innerHTML = '';
                const history = JSON.parse(savedHistory);
                history.forEach(msg => {
                    appendMessage(msg.text, msg.className, false);
                });
            }
        });

        function saveToHistory(text, className) {
            let history = localStorage.getItem('chatHistory') ? JSON.parse(localStorage.getItem('chatHistory')) : [];
            history.push({ text: text, className: className });
            localStorage.setItem('chatHistory', JSON.stringify(history));
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (text === '') return;

            appendMessage(text, 'user-message', true);
            userInput.value = '';

            const typingIndicator = showTypingIndicator();
            const aiResponse = await getAIResponse(text);
            typingIndicator.remove();
            
            appendMessage(aiResponse, 'ai-message', true);
        }

        // Karakter Yazdırma Fonksiyonu (Boşlukları yutmayan yeni nesil textContent sistemi)
        function appendMessage(text, className, isNew = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            chatMessages.appendChild(messageDiv);
            
            if (className === 'ai-message' && isNew) {
                let i = 0;
                messageDiv.textContent = "";
                function typeWriter() {
                    if (i < text.length) {
                        messageDiv.textContent += text.charAt(i);
                        i++;
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                        setTimeout(typeWriter, 12);
                    } else {
                        saveToHistory(text, className);
                    }
                }
                typeWriter();
            } else {
                messageDiv.textContent = text;
                if (isNew && className === 'user-message') {
                    saveToHistory(text, className);
                }
            }
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageDiv;
        }

        function showTypingIndicator() {
            const indicatorDiv = document.createElement('div');
            indicatorDiv.className = 'typing-indicator';
            indicatorDiv.innerHTML = '<span></span><span></span><span></span>';
            chatMessages.appendChild(indicatorDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return indicatorDiv;
        }

        // Geliştirilmiş Akıllı Veri Yakalama Fonksiyonu
        async function getAIResponse(userText) {
            try {
                const response = await fetch('/api/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                
                const data = await response.json();

                if (data.reply) return data.reply;
                if (data.text) return data.text;
                if (data.response) return data.response;
                if (typeof data === 'string') return data;
                if (data.error) return `Sorun var kral: ${data.error}`;

                return "Mesajını aldım ama düzgün metne çeviremedim reis, tekrar yazar mısın?";
            } catch (error) {
                console.error("Hata:", error);
                return "Bağlantı kurulurken bir sorun oluştu, lütfen sitenin canlı versiyonunda dene.";
            }
        }
    </script>
</body>
</html>

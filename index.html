<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>caavo0</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.5s;
        }

        #particles-js {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px 20px 10px;
            background: rgba(11, 19, 43, 0.95);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .tab-btn {
            flex: 1;
            max-width: 160px;
            padding: 13px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #1d2d44;
            color: #90e0ef;
        }

        .tab-btn.active {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            color: white;
        }

        h1 {
            font-size: 3.2rem;
            color: #48cae4;
            text-shadow: 0 0 20px #00b4d8;
            text-align: center;
            margin: 15px 0 25px 0;
        }

        .tab-content {
            display: none;
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
            padding: 0 20px 30px;
        }

        .tab-content.active { display: block; }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        a.social-btn {
            text-decoration: none;
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            color: white;
            padding: 16px 20px;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .chat-container {
            width: 100%;
            max-width: 340px;
            height: 520px;
            background: rgba(26, 39, 68, 0.9);
            border-radius: 22px;
            box-shadow: 0 10px 40px rgba(0, 180, 216, 0.4);
            border: 2px solid #00b4d8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0 auto;
        }

        .chat-header {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            padding: 16px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .chat-messages {
            flex: 1;
            padding: 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user-message { background: #48cae4; color: #0b132b; align-self: flex-end; }
        .ai-message { background: #1d2d44; color: #90e0ef; align-self: flex-start; border: 1px solid #3a506b; }

        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 12px 16px;
            background: #1d2d44;
            border-radius: 18px;
            align-self: flex-start;
            border: 1px solid #3a506b;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #90e0ef;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.3s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-input-area {
            display: flex;
            padding: 12px 16px;
            background: #0b132b;
            gap: 10px;
            border-top: 1px solid rgba(0, 180, 216, 0.2);
        }

        .chat-input-area input {
            flex: 1;
            background: #1d2d44;
            border: 1px solid #3a506b;
            padding: 14px 18px;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            min-width: 0;
        }

        .chat-input-area button {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            border: none;
            color: white;
            padding: 0 26px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }

        /* Ayarlar Butonu */
        .settings-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(0, 180, 216, 0.6);
            z-index: 30;
        }

        /* Ayarlar Sayfası */
        .settings-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0b132b;
            display: none;
            flex-direction: column;
            z-index: 40;
        }

        .settings-page.show {
            display: flex;
        }

        .settings-header {
            padding: 20px;
            display: flex;
            align-items: center;
            background: #1d2d44;
        }

        .back-btn {
            font-size: 1.8rem;
            margin-right: 15px;
            cursor: pointer;
        }

        .settings-title {
            font-size: 1.5rem;
            color: #48cae4;
        }

        .settings-body {
            padding: 25px;
            flex: 1;
        }

        .setting-item {
            padding: 18px 0;
            border-bottom: 1px solid #3a506b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="tabs">
        <button class="tab-btn active" id="mediaTab" onclick="switchTab(0)">Medya</button>
        <button class="tab-btn" id="aiTab" onclick="switchTab(1)">Caavo0 AI</button>
    </div>

    <h1>caavo0</h1>

    <div id="tab0" class="tab-content active">
        <div class="links-container">
            <a href="https://github.com/caavo0" class="social-btn" target="_blank">GitHub</a>
            <a href="https://www.youtube.com/@caavo0-r6u" class="social-btn" target="_blank">YouTube</a>
            <a href="https://www.tiktok.com/@caavo0" class="social-btn" target="_blank">TikTok</a>
            <a href="https://discord.com/users/caavo0_" class="social-btn" target="_blank">Discord</a>
        </div>
    </div>

    <div id="tab1" class="tab-content">
        <div class="chat-container">
            <div class="chat-header" id="chatHeader">Caavo0 AI Assistant</div>
            <div class="chat-messages" id="chatMessages">
                <div class="message ai-message" id="welcomeMessage">Merhaba kardeşim! Ben Caavo0. Sor bakalım 😊</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Mesaj yaz..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="sendBtn">Gönder</button>
            </div>
        </div>
    </div>

    <!-- Ayarlar Butonu -->
    <div class="settings-btn" onclick="openSettings()">⚙️</div>

    <!-- Ayarlar Sayfası -->
    <div class="settings-page" id="settingsPage">
        <div class="settings-header">
            <span class="back-btn" onclick="closeSettings()">←</span>
            <div class="settings-title" id="settingsTitle">Ayarlar</div>
        </div>
        <div class="settings-body">
            <div class="setting-item">
                <span id="languageLabel">Dil Seçimi</span>
                <select id="languageSelect" onchange="changeLanguage()" style="background:#1d2d44; color:white; border:none; padding:8px 12px; border-radius:8px;">
                    <option value="tr">Türkçe</option>
                    <option value="en">English</option>
                    <option value="de">Deutsch</option>
                </select>
            </div>

            <div class="setting-item">
                <span id="themeLabel">Tema</span>
                <select id="themeSelect" onchange="changeTheme()" style="background:#1d2d44; color:white; border:none; padding:8px 12px; border-radius:8px;">
                    <option value="blue">Mavi (Particles)</option>
                    <option value="purple">Mor Nebula</option>
                    <option value="green">Yeşil Orman</option>
                    <option value="red">Kırmızı Ateş</option>
                </select>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        let currentLang = "tr";
        let currentTheme = "blue";

        const translations = {
            tr: { /* ... aynı */ },
            en: { /* ... aynı */ },
            de: { /* ... aynı */ }
        };

        function applyTheme(theme) {
            currentTheme = theme;
            const body = document.body;
            const particles = document.getElementById('particles-js');

            if (theme === "blue") {
                body.style.backgroundColor = "#0b132b";
                particlesJS("particles-js", {
                    particles: { number: { value: 80 }, color: { value: "#90e0ef" }, line_linked: { color: "#00b4d8" } }
                });
            } else if (theme === "purple") {
                body.style.backgroundColor = "#1a0b2e";
                particlesJS("particles-js", {
                    particles: { number: { value: 60 }, color: { value: "#c084fc" }, line_linked: { color: "#a855f7" } }
                });
            } else if (theme === "green") {
                body.style.backgroundColor = "#0b2e1a";
                particlesJS("particles-js", {
                    particles: { number: { value: 70 }, color: { value: "#4ade80" }, line_linked: { color: "#22c55e" } }
                });
            } else if (theme === "red") {
                body.style.backgroundColor = "#2e0b0b";
                particlesJS("particles-js", {
                    particles: { number: { value: 65 }, color: { value: "#f87171" }, line_linked: { color: "#ef4444" } }
                });
            }
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach((el, i) => el.classList.toggle('active', i === n));
            document.querySelectorAll('.tab-btn').forEach((el, i) => el.classList.toggle('active', i === n));
        }

        // ... diğer fonksiyonlar (sendMessage, typeWriterEffect vb.) aynı kalıyor

        function openSettings() {
            document.getElementById('settingsPage').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsPage').classList.remove('show');
        }

        function changeLanguage() {
            currentLang = document.getElementById('languageSelect').value;
            // ... dil değişim kodları aynı
        }

        function changeTheme() {
            const theme = document.getElementById('themeSelect').value;
            applyTheme(theme);
        }

        // İlk tema yükle
        applyTheme("blue");
    </script>
</body>
</html>

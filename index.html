<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caavo0 AI</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #080c14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e3e3e3;
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        html {
            height: 100vh;
            height: -webkit-fill-available;
        }

        /* Üst Menü / Sekmeler */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 12px 20px;
            background: #080c14;
            flex-shrink: 0;
            z-index: 10;
        }

        .tab-btn {
            flex: 1;
            max-width: 140px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #151e2e;
            color: #90e0ef;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: #0077b6;
            color: white;
        }

        .tab-content {
            display: none;
            flex: 1;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            overflow: hidden;
        }

        .tab-content.active { 
            display: flex; 
            flex-direction: column;
        }

        /* Medya Sekmesi Linkleri */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding: 20px;
            width: 100%;
            overflow-y: auto;
        }

        a.social-btn {
            text-decoration: none;
            background: #151e2e;
            color: #90e0ef;
            padding: 18px 20px;
            border-radius: 16px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            border: 1px solid #1f2d44;
        }

        /* Gemini Stili Chat Düzeni */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .chat-header-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 8px 20px;
            flex-shrink: 0;
        }

        /* Sol Üst Köşedeki İki Çizgili Menü Butonu */
        .menu-toggle-btn {
            position: absolute;
            left: 20px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .menu-toggle-btn span {
            width: 100%;
            height: 2px;
            background-color: #90e0ef;
            border-radius: 2px;
        }

        .menu-toggle-btn:hover {
            opacity: 1;
        }

        .chat-header {
            font-size: 1.1rem;
            color: #90e0ef;
            font-weight: 500;
            opacity: 0.9;
        }

        /* Sağ Üst İşlemler Kapsayıcısı */
        .actions-wrapper {
            position: absolute;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .new-chat-btn {
            width: 24px;
            height: 24px;
            cursor: pointer;
            opacity: 0.7;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s, transform 0.1s;
        }

        .new-chat-btn svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: #90e0ef;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .settings-btn {
            font-size: 1.3rem;
            cursor: pointer;
            opacity: 0.7;
            user-select: none;
            transition: opacity 0.2s;
        }

        .settings-btn:hover, .new-chat-btn:hover { opacity: 1; }
        .new-chat-btn:active { transform: scale(0.95); }

        /* Kayarak Açılan Geçmiş Paneli (Sidebar) */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background-color: #0c1322;
            border-right: 1px solid #1f2d44;
            z-index: 50;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #48cae4;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .close-sidebar-btn {
            cursor: pointer;
            font-size: 1.5rem;
            color: #90e0ef;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            padding: 12px 15px;
            background: #151e2e;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: #1f2d44;
            border-color: #0077b6;
        }

        /* Karartma Katmanı (Panel açılınca arkası kararsın diye) */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 45;
            display: none;
        }

        .sidebar-overlay.show {
            display: block;
        }

        /* Mesaj Alanları */
        .chat-messages {
            flex: 1;
            padding: 10px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user-message { 
            background: #0077b6; 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px;
        }
        
        .ai-message { 
            background: transparent; 
            color: #e3e3e3; 
            align-self: flex-start; 
            padding-left: 5px;
        }

        .welcome-text {
            text-align: center;
            color: #90e0ef;
            font-size: 1.3rem;
            margin-top: auto;
            margin-bottom: auto;
            padding: 0 20px;
        }

        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
            background: #151e2e;
            border-radius: 20px;
            align-self: flex-start;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #90e0ef;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.3s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-input-container {
            padding: 12px 16px;
            background: #080c14;
            flex-shrink: 0;
        }

        .chat-input-wrapper {
            background: #151e2e;
            border-radius: 32px;
            display: flex;
            align-items: center;
            padding: 6px 10px 6px 18px;
            border: 1px solid #1f2d44;
            width: 100%;
        }

        .chat-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            font-size: 1rem;
            outline: none;
        }

        .chat-input-wrapper button {
            background: #0077b6;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* Ayarlar Sayfası */
        .settings-page {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #080c14;
            display: none;
            flex-direction: column;
            z-index: 60;
        }

        .settings-page.show { display: flex; }
        .settings-header { padding: 20px; display: flex; align-items: center; background: #151e2e; }
        .back-btn { font-size: 1.8rem; margin-right: 15px; cursor: pointer; }
        .settings-title { font-size: 1.5rem; color: #48cae4; }
        .settings-body { padding: 25px; flex: 1; }
        .setting-item {
            padding: 18px 0;
            border-bottom: 1px solid #1f2d44;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- Üst Kısım -->
    <div class="tabs">
        <button class="tab-btn active" id="mediaTab" onclick="switchTab(0)">Medya</button>
        <button class="tab-btn" id="aiTab" onclick="switchTab(1)">Caavo0 AI</button>
    </div>

    <!-- Medya Sekmesi -->
    <div id="tab0" class="tab-content active">
        <div class="links-container">
            <a href="https://github.com/caavo0" class="social-btn" target="_blank">GitHub</a>
            <a href="https://www.youtube.com/@caavo0-r6u" class="social-btn" target="_blank">YouTube</a>
            <a href="https://www.tiktok.com/@caavo0" class="social-btn" target="_blank">TikTok</a>
            <a href="https://discord.com/users/caavo0_" class="social-btn" target="_blank">Discord</a>
        </div>
    </div>

    <!-- AI Sohbet Sekmesi -->
    <div id="tab1" class="tab-content">
        <div class="chat-container">
            <div class="chat-header-wrapper">
                <!-- Sol Üstteki İki Çizgili Buton -->
                <div class="menu-toggle-btn" onclick="toggleSidebar()">
                    <span></span>
                    <span></span>
                </div>

                <div class="chat-header" id="chatHeader">Caavo0 AI</div>
                
                <div class="actions-wrapper">
                    <div class="new-chat-btn" onclick="createNewChat()" title="Yeni Sohbet Başlat">
                        <svg viewBox="0 0 24 24">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                    </div>
                    <div class="settings-btn" onclick="openSettings()">⚙️</div>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-text" id="welcomeMessage">Merhaba! Nasıl yardımcı olabilirim?</div>
            </div>
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <input type="text" id="userInput" placeholder="Caavo0'a sorun..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()" id="sendBtn">➔</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Yan Menü (Sohbet Geçmişi) Kapsayıcıları -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>Sohbet Geçmişi</span>
            <span class="close-sidebar-btn" onclick="toggleSidebar()">×</span>
        </div>
        <div class="history-list" id="historyList">
            <!-- Geçmiş sohbetler buraya dinamik eklenecek -->
        </div>
    </div>

    <!-- Ayarlar Sayfası -->
    <div class="settings-page" id="settingsPage">
        <div class="settings-header">
            <span class="back-btn" onclick="closeSettings()">←</span>
            <div class="settings-title" id="settingsTitle">Ayarlar</div>
        </div>
        <div class="settings-body">
            <div class="setting-item">
                <span id="languageLabel">Dil Seçimi</span>
                <select id="languageSelect" onchange="changeLanguageFromSelect()" style="background:#151e2e; color:white; border:1px solid #1f2d44; padding:8px 12px; border-radius:8px;">
                    <option value="tr">Türkçe</option>
                    <option value="en">English</option>
                    <option value="de">Deutsch</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        let currentLang = "tr";
        let chatSessions = []; // Tüm geçmiş sohbet odalarını tutacak dizi
        let currentSessionId = null;

        const translations = {
            tr: {
                mediaTab: "Medya", aiTab: "Caavo0 AI", chatHeader: "Caavo0 AI",
                welcomeMessage: "Merhaba! Nasıl yardımcı olabilirim?", inputPlaceholder: "Caavo0'a sorun...",
                settingsTitle: "Ayarlar", languageLabel: "Dil Seçimi", errorMessage: "Bağlantı hatası, tekrar dene."
            },
            en: {
                mediaTab: "Media", aiTab: "Caavo0 AI", chatHeader: "Caavo0 AI",
                welcomeMessage: "Hello! How can I help you today?", inputPlaceholder: "Ask Caavo0...",
                settingsTitle: "Settings", languageLabel: "Language", errorMessage: "Connection error, please try again."
            },
            de: {
                mediaTab: "Medien", aiTab: "Caavo0 AI", chatHeader: "Caavo0 AI",
                welcomeMessage: "Hallo! Wie kann ich dir heute helfen?", inputPlaceholder: "Frag Caavo0...",
                settingsTitle: "Einstellungen", languageLabel: "Sprache", errorMessage: "Verbindungsfehler, bitte erneut versuchen."
            }
        };

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach((el, i) => el.classList.toggle('active', i === n));
            document.querySelectorAll('.tab-btn').forEach((el, i) => el.classList.toggle('active', i === n));
        }

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const chatHeader = document.getElementById('chatHeader');
        const mediaTab = document.getElementById('mediaTab');
        const aiTab = document.getElementById('aiTab');
        const languageSelect = document.getElementById('languageSelect');
        const historyList = document.getElementById('historyList');

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // Yan menüyü açıp kapatma fonksiyonu
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Eğer şu an aktif bir sohbet kimliği yoksa yeni session oluştur
            if (!currentSessionId) {
                currentSessionId = Date.now();
                chatSessions.push({
                    id: currentSessionId,
                    title: text.substring(0, 24) + (text.length > 24 ? "..." : ""),
                    messages: []
                });
                updateSidebarUI();
            }

            const wm = document.getElementById('welcomeMessage');
            if(wm) wm.remove();

            // Kullanıcı mesajını kaydet ve ekrana bas
            const activeSession = chatSessions.find(s => s.id === currentSessionId);
            activeSession.messages.push({ type: 'user', text: text });
            appendMessage(text, 'user-message');
            userInput.value = '';

            const typing = showTypingIndicator();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                typing.remove();
                
                const replyText = data.reply || translations[currentLang].errorMessage;
                activeSession.messages.push({ type: 'ai', text: replyText });
                typeWriterEffect(replyText, 'ai-message');
            } catch (err) {
                typing.remove();
                const replyText = translations[currentLang].errorMessage;
                activeSession.messages.push({ type: 'ai', text: replyText });
                typeWriterEffect(replyText, 'ai-message');
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function typeWriterEffect(fullText, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            let processedText = fullText.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            let i = 0;
            function type() {
                if (i < processedText.length) {
                    let char = processedText.charAt(i);
                    if (char === '\n') {
                        div.innerHTML += '<br>';
                    } else {
                        div.innerHTML += char;
                    }
                    i++;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    setTimeout(type, 15);
                }
            }
            type();
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        // Yeni sohbet başlatma fonksiyonu
        function createNewChat() {
            currentSessionId = null;
            chatMessages.innerHTML = '';
            
            const wm = document.createElement('div');
            wm.className = 'welcome-text';
            wm.id = 'welcomeMessage';
            wm.textContent = translations[currentLang].welcomeMessage;
            
            chatMessages.appendChild(wm);
            userInput.value = '';
        }

        // Geçmiş panelindeki listeyi yenileyen fonksiyon
        function updateSidebarUI() {
            historyList.innerHTML = '';
            // En yeni sohbeti en üstte göstermek için ters çeviriyoruz
            [...chatSessions].reverse().forEach(session => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.textContent = session.title;
                item.onclick = () => {
                    loadChatSession(session.id);
                    toggleSidebar();
                };
                historyList.appendChild(item);
            });
        }

        // Geçmişten seçilen bir sohbeti ekrana yükleme fonksiyonu
        function loadChatSession(id) {
            currentSessionId = id;
            chatMessages.innerHTML = '';
            const session = chatSessions.find(s => s.id === id);
            
            if(session && session.messages.length > 0) {
                session.messages.forEach(msg => {
                    if(msg.type === 'user') {
                        appendMessage(msg.text, 'user-message');
                    } else {
                        appendMessage(msg.text, 'ai-message');
                    }
                });
            } else {
                createNewChat();
            }
        }

        function openSettings() { document.getElementById('settingsPage').classList.add('show'); }
        function closeSettings() { document.getElementById('settingsPage').classList.remove('show'); }
        function changeLanguageFromSelect() { currentLang = languageSelect.value; updateUIStrings(); }

        function updateUIStrings() {
            mediaTab.textContent = translations[currentLang].mediaTab;
            aiTab.textContent = translations[currentLang].aiTab;
            chatHeader.textContent = translations[currentLang].chatHeader;
            
            const wm = document.getElementById('welcomeMessage');
            if(wm) wm.textContent = translations[currentLang].welcomeMessage;
            userInput.placeholder = translations[currentLang].inputPlaceholder;
            document.getElementById('settingsTitle').textContent = translations[currentLang].settingsTitle;
            document.getElementById('languageLabel').textContent = translations[currentLang].languageLabel;
        }
    </script>
</body>
</html>
